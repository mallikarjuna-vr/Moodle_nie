# content of pytest.ini
[pytest]
# Run firefox with UI
addopts = --headed
          --browser=chromium
          --tracing=retain-on-failure
          --video=retain-on-failure
          --screenshot=only-on-failure
          --reruns=0
          --reruns-delay=2
          --slowmo=1000
          --html=reports/report.html
          --alluredir=reports/allure-results
          --base-url=https://moodlegurukul.nie.ac.in/

          --numprocesses=2









